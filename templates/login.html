<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FJKDEV | Acceso al Sistema</title>
    <link href="../static/assets/login.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-container page-enter">
            <div class="form-blob">
                <img src="../static/assets/img/blob.svg" alt="blob" class="blob-image blob-image--1" />
                <img src="../static/assets/img/blob.svg" alt="blob" class="blob-image blob-image--2" />
                <img src="../static/assets/img/blob.svg" alt="blob" class="blob-image blob-image--3" />
            </div>

            <div class="logo-section">
                <img src="../static/assets/img/Logo_Practica.png" alt="FJKDEV" class="main-logo">
            </div>

            <div class="form-header">
                <h1>Inicio de Sesión</h1>
                <p>Porfavor ingrese sus credenciales</p>
                {% if error %}
                    <div class="error-box">{{ error }}</div>
                {% endif %}
            </div>
            
            <form class="form-box" method="POST" action="/login">
                <div class="input-group">
                    <input type="text" id="usuario" name="usuario" class="input-field" placeholder=" " value="{{ usuario_guardado }}" required>
                    <label for="usuario" class="floating-label">Username</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" class="input-field" placeholder=" " value="{{ password_guardada }}" required>
                    <label for="password" class="floating-label">Password</label>
                    <div class="eye-icon" onclick="togglePassword()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" {% if usuario_guardado %}checked{% endif %}>
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        const form = document.querySelector('.form-box');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const container = document.querySelector('.form-container');
            container.classList.remove('page-enter');
            container.classList.add('page-leave');
            
            setTimeout(() => {
                this.submit();
            }, 400);
        });
    </script>
</body>
</html>
